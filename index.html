<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đèn Kéo Quân 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:linear-gradient(135deg,#74ebd5,#9face6);overflow:hidden}
h1{text-align:center;color:#fff;margin-top:20px}
.scene{width:300px;height:300px;margin:100px auto;perspective:1000px}
.carousel{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:rotate 15s linear infinite}
.carousel:hover{animation-play-state:paused}
.carousel img{position:absolute;width:220px;height:150px;left:40px;top:75px;object-fit:cover;border-radius:10px;border:4px solid #fff;box-shadow:0 0 10px #000}
.carousel img:nth-child(1){transform:rotateY(0deg) translateZ(260px)}
.carousel img:nth-child(2){transform:rotateY(60deg) translateZ(260px)}
.carousel img:nth-child(3){transform:rotateY(120deg) translateZ(260px)}
.carousel img:nth-child(4){transform:rotateY(180deg) translateZ(260px)}
.carousel img:nth-child(5){transform:rotateY(240deg) translateZ(260px)}
.carousel img:nth-child(6){transform:rotateY(300deg) translateZ(260px)}
@keyframes rotate{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
p{text-align:center;color:#fff;font-size:20px;margin-top:20px}
</style>
</head>
<body>
<h1>ĐÈN KÉO QUÂN 3D</h1>
<div class="scene">
<div class="carousel">
<img src="1.jpg" alt="">
<img src="2.jpg" alt="">
<img src="3.jpg" alt="">
<img src="4.jpg" alt="">
<img src="5.jpg" alt="">
<img src="6.jpg" alt="">
</div>
</div>
<p>Di chuyển chuột vào hình để dừng quay - Rê chuột ra để tiếp tục quay.</p>
</body>
</html>
